$schema: http://json-schema.org/draft-07/schema#
title: Apertus Dataset Metadata Schema
description: |
  Official YAML schema for dataset entries in the `apertus_data` catalogue.
  All files must be stored as `apertus_data/catalogue/[dataset_id].yaml`.

  **YAML Style Rules (mandatory)**:
  - Use **2-space indentation** only, no tabs.
  - Lists (`- item`) must be indented under their parent key.
  - Strings containing special characters or starting with punctuation must be quoted.

  `x-`-preceeded properties are used to provide hints for the GitHub issue form and are ignored in direct YAML editing.
type: object
additionalProperties: false

required:
  - owner
  - name
  - tags
  - modalities
  - licenses
  - formats
  - id
  - build_requirements
  - build_history
  - usage_history

properties:

  # ==================== IDENTIFICATION ====================
  url:
    type: [ string, "null" ]
    description: |
      Clean, canonical URL to the original dataset (without query parameters, fragments, or file paths). 
      Leave empty (on GitHub issue) or `null`  (in direct YAML editing) for internal/generated datasets with no public URL.
      Examples
      - ✅ https://huggingface.co/datasets/LLM360/MegaMath
      - ✅ https://zenodo.org/records/1234567
      - ❌ https://huggingface.co/datasets/LLM360/MegaMath?ref=main
      - ❌ https://huggingface.co/datasets/LLM360/MegaMath/blob/main/data.jsonl.
      - ✅ `null`
    pattern: "^(https?://[^?#%\\s&]+)?$"
    # GitHub Issue Form hints
    x-git-issue-type: input
    x-git-issue-placeholder: "https://huggingface.co/datasets/LLM360/MegaMath"
    x-git-issue-required: false


  owner:
    type: string
    description: |
      Owner or organization responsible for the dataset.
      - ➡️ Hugging Face / GitHub: username or organization (e.g. "LLM360")
      - ➡️ Other platforms: platform name (e.g. "zenodo")
      - ➡️ Internally generated: "swiss-ai"
    pattern: "^[a-zA-Z0-9][a-zA-Z0-9_-]*$"
    minLength: 1
    # GitHub Issue Form hints
    x-git-issue-type: input
    x-git-issue-placeholder: "LLM360"
    x-git-issue-required: true

  name:
    type: string
    description: Official or primary name of the dataset (e.g. "MegaMath", "FineWeb-Edu").
    minLength: 1
    # GitHub Issue Form hints
    x-git-issue-type: input
    x-git-issue-placeholder: "MegaMath"
    x-git-issue-required: true

  # Todo: version and commit hash could be two different fields.
  version:
    type: [ string, "null" ]
    description: |
      Version identifier of the dataset. 
      - ➡️ Version-controlled sources (HF, GitHub): full (40 hex) commit hash
      - ➡️ Explicit releases: version string (replace spaces with underscores)
      - ➡️ Leave empty (on GitHub issue) or `null` (in direct YAML editing) if no version exists.


      Examples:
      - ✅ 5bc987ce1580cd8afe385e003598aa8c29cd63cc
      - ✅ v1.01
      - ✅ version_2
      - ✅ `null`
    pattern: "^[a-zA-Z0-9._-]*$"
    # GitHub Issue Form hints
    x-git-issue-type: input
    x-git-issue-placeholder: "5bc987ce1580cd8afe385e003598aa8c29cd63cc"
    x-git-issue-required: false

  # ==================== METADATA ====================
  tags:
    type: array
    description: |
      Tags describing the dataset's purpose, domain, and intended ML use case.
    items:
      type: string
      enum:
        - reinforcement learning
        - supervised fine-tuning
        - preference
        - alignment
        - pre-training
        - long context
        - question answering
        - math
        - knowledge recall
        - code
        - reasoning
        - medical
        - multilingual
        - safety
        - table
        - system prompt
        - chemistry
        - topic following
        - music
        - multi-turn
        - physics
        - function calling
        - controversy
        - politics
        - history
        - legal
        - news
        - finance
        - instruction following
        - truthfulness
    uniqueItems: true
    minItems: 1
    # GitHub Issue Form hints
    x-git-issue-type: textarea
    x-git-issue-placeholder: |
      pre-training
      math
      reasoning
    x-git-issue-required: true

  modalities:
    type: array
    description: Data modalities present in the dataset.
    items:
      type: string
      enum:
        - text
        - audio
        - image
    uniqueItems: true
    minItems: 1
    # GitHub Issue Form hints
    x-git-issue-type: checkboxes
    x-git-issue-required: true

  languages:
    type: array
    description: |
      Languages present using ISO 639-1 codes.
      Use "multilingual" or "european" when appropriate.
    items:
      type: string
    uniqueItems: true
    # GitHub Issue Form hints
    x-git-issue-type: textarea
    x-git-issue-placeholder: |
      en
      fr
      multilingual
    x-git-issue-required: false

  # todo : this could be a drop-down with a free-text "other" option.
  licenses:
    type: array
    description: |
      License(s) of the dataset. Must be written in lowercase only. Use standard SPDX identifiers when possible.
      One per line, no quotes.
      Examples:
      - ✅ cc-by-nc 4.0
      - ❌ CC-BY-NC 4.0
    items:
      type: string
      pattern: "^[a-z0-9. -]+$"
    minItems: 1
    uniqueItems: true
    # GitHub Issue Form hints
    x-git-issue-type: textarea
    x-git-issue-placeholder: |
      mit
      apache-2.0
    x-git-issue-required: true


  formats:
    type: array
    description: |
      File formats present in the final dataset (include the leading dot). One format per line, no quotes.
      Examples:
      - ✅ .jsonl
      - ✅ .parquet
      - ❌ jsonl (missing leading dot)
    items:
      type: string
      pattern: "^\\.[a-z0-9]+$"
    minItems: 1
    uniqueItems: true
    # GitHub Issue Form hints
    x-git-issue-type: textarea
    x-git-issue-placeholder: |
      .jsonl
      .parquet
    x-git-issue-required: true

  type:
    type: string
    description: "Whether the dataset is raw (i.e. directly taken from HuggingFace or any other source), processed (by us), or tokenized."
    enum:
      - raw
      - processed
      - tokenized
    # GitHub Issue Form hints
    x-git-issue-type: dropdown
    x-git-issue-options:
      - raw
      - processed
      - tokenized
    x-git-issue-required: false

  notes:
    type: [ string, "null" ]
    description: |
      Free-text notes or important remarks about the dataset.

    # GitHub Issue Form hints
    x-git-issue-type: textarea
    x-git-issue-placeholder: "Any additional information, limitations, usage tips..."
    x-git-issue-required: false

  # ==================== AUTOMATIC FIELDS ====================
  id:
    type: string
    description: |
      Deterministic unique identifier for this dataset (auto-generated).
      Do not edit manually.
    minLength: 1

  root_dir:
    type: string
    description: |
      Path to the root directory of the dataset on disk.
    minLength: 1

  data_dir:
    type: string
    description: |
      Path to the root directory of the dataset on disk.
    minLength: 1

  logs_dir:
    type: string
    description: |
      Path to the root directory of the dataset on disk.
    minLength: 1

  hashes_dir:
    type: string
    description: |
      Path to the root directory of the dataset on disk.
    minLength: 1

  # ==================== BUILD INFORMATION ====================
  build_requirements:
    type: object
    description: |
      Instructions and provenance for how this dataset was (or should be) built.
    additionalProperties: false
    required:
      - source_datasets_ids
    properties:
      source_datasets_ids:
        type: array
        description: |
          List of internal dataset `id` values this one depends on.
          Use an empty list for original/raw datasets.
        items:
          type: string
        minItems: 0

      # Todo: change this
      build_script_url:
        type: [ string, "null" ]
        description: URL to the processing script used. Null for raw datasets without a build script.
        pattern: "^https://github.com/sven-nm/apertus_data/blob/main/builders"

      build_script_commit:
        type: [ string, "null" ]
        description: Git commit hash (40 characters) of the processing script used. Null for raw datasets.
        pattern: "^[0-9a-f]{40}$"

  build_history:
    type: array
    description: History of builds of this dataset.
    items:
      type: object
      additionalProperties: false
      required:
        - datetime
        - username
      properties:
        datetime:
          type: string
          description: Date and time when this build was created (e.g. "2026-05-12T14:30:00Z").
          format: date-time
        username:
          type: string
          description: GitHub username of the person who triggered the build.

  # ==================== USAGE TRACKING ====================
  usage_history:
    type: array
    description: Record of where and how this dataset has been used.
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - date
        - username
      properties:
        name:
          type: string
          description: Identifier for this usage (e.g. "v1_pretraining", "experiment_foo").
        date:
          type: string
          format: date-time
        username:
          type: string
          description: GitHub username of the person who used the dataset.